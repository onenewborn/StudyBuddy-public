  <!-- ⚡ bolt -->
  <text x="96" y="118" font-size="88" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif">⚡</text>
  <!-- label -->
  <text x="96" y="158" font-size="13" text-anchor="middle"
        fill="rgba(34,211,238,0.75)"
